# Nginx configuration template for Xenia Web Services on Docker
# The configuration is based from the original nginx.conf with adjustments to Docker paths and hosts
# Contains rate limiting, security headers, and proxy settings for the backend service

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    server_tokens off;
    tcp_nopush on;
    tcp_nodelay on;

    # Must read the body in 5 seconds.
    client_body_timeout 5;

    gzip on;
    gzip_comp_level 2;
    gzip_min_length 512;
    gzip_proxied any;

    # Trust the Docker bridge network to pass the real IP
    set_real_ip_from 172.16.0.0/12;     # Docker default bridge network
    set_real_ip_from 10.0.0.0/8;        # Usually VPN IP range 
    set_real_ip_from 192.168.0.0/16;    # Common private network range
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Logging: Redirecting to stdout/stderr is standard Docker practice
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Xenia_WebServices service
    upstream backend_server {
        server backend:36000;
    }

    # Rate Limiting Logic
    geo $limit {
        default 1;
        10.0.0.0/8 0;
        172.16.0.0/12 0;
        192.168.0.0/24 0;
        127.0.0.0/8 0;       # Loopback
    }

    # Only rate limit non-private clients
    map $limit $limit_key {
        0 "";
        1 $binary_remote_addr;
    }

    limit_req_zone $limit_key zone=req_zone:10m rate=15r/s;

    # Private IP ranges
    allow   192.168.0.0/16;
    allow   172.16.0.0/12;
    allow   127.0.0.0/8;
    allow   10.0.0.0/8;
    
    # allow   <public ip>;
    # deny    all;
    
    server {
        listen 80;
        server_name localhost;

        keepalive_timeout 5 5;

        # Rate Limit
        limit_req zone=req_zone burst=20 nodelay;

        # Docker path for static content
        set $root_static_content "/usr/share/nginx/html";

        location / {
            root $root_static_content;
            index index.html;

            # CORS Headers
            # Since we're serving static content from Nginx we need to add the headers here
            add_header Access-Control-Allow-Origin *;
            add_header Accept-Ranges bytes;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://code.jquery.com 'sha256-Zww3/pDgfYVU8OPCr/mr7NFf4ZA0lY1Xeb22wR47e0w=' 'sha256-ZswfTY7H35rbv8WC7NXBoiC7WNu86vSzCDChNWwZZDM='; base-uri 'self'; font-src 'self' https: data:; form-action 'self'; frame-ancestors 'self'; img-src 'self' data:; object-src 'none'; script-src-attr 'none'; style-src 'self' https: 'unsafe-inline'";
            add_header Cross-Origin-Opener-Policy same-origin;
            add_header Cross-Origin-Resource-Policy same-origin;
            add_header Referrer-Policy no-referrer;
            add_header Strict-Transport-Security "max-age=15552000; includeSubDomains";

            # Security Headers
            add_header X-Content-Type-Options nosniff;
            add_header X-DNS-Prefetch-Control off;
            add_header X-Download-Options noopen;
            add_header X-Frame-Options SAMEORIGIN;
            add_header X-Permitted-Cross-Domain-Policies none;
            add_header X-XSS-Protection 0;

            expires 30d;

            # Check if endpoint is a file otherwise change to named location
            try_files $uri $uri/ @backend;
        }

        location @backend {
            access_log /var/log/nginx/api.access.log main;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optimized for real-time (disable buffering)
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_redirect off;
            proxy_pass http://backend_server;
        }

        # redirect server error pages to the static page /50x.html
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root $root_static_content;
        }
    }
}
